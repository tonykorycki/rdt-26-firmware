; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:teensy41]
platform = teensy
board = teensy41
framework = arduino
lib_deps = FlexCAN_T4

; Sensor calibration tool — polls the child's 18-byte telemetry packet and
; accepts serial commands to drive motors via I2C.  Child must run main firmware.
; Build + upload:  pio run -e teensy41_sensor_cal -t upload
; Monitor:         Serial Monitor or Teleplot @ 115200 baud
[env:teensy41_sensor_cal]
platform = teensy
board = teensy41
framework = arduino
build_src_filter = +<../test/test_sensor_cal/*> +<parent.cpp>
