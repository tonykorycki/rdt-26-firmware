; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html
[platformio]
default_envs = teensy41


[env:teensy41]
platform = teensy
board = teensy41
framework = arduino

; Sensor bring-up monitor — streams current sensors + encoders to Teleplot.
; Pulls test_main.cpp in as the entry point via the relative path filter;
; only the two needed sensor drivers are compiled from src/.
; Build + upload:  pio run -e teensy41_sensor_test -t upload
; Monitor:         Serial Monitor / Teleplot @ 115200 baud
[env:teensy41_sensor_test]
platform = teensy
board = teensy41
framework = arduino
build_src_filter = +<../test/test_sensors/*> +<drivers/sensors/current_sensors.cpp> +<drivers/sensors/rotary_encoders.cpp>

; String potentiometer calibration monitor.
; Pulls test_main.cpp from test/test_string_pot and only compiles string_pot.cpp from src/.
; Build + upload:  pio run -e teensy41_string_pot_test -t upload
; Monitor:         Serial Monitor / Teleplot @ 115200 baud
[env:teensy41_string_pot_test]
platform = teensy
board = teensy41
framework = arduino
build_src_filter = +<../test/test_string_pot/*> +<drivers/sensors/string_pot.cpp>

; Deposition door timing/state monitor.
; Pulls test_main.cpp from test/test_depo_door and compiles the depo door
; driver plus current sensors for optional end-stop current detection.
; Build + upload:  pio run -e teensy41_depo_door_test -t upload
; Monitor:         Serial Monitor / Teleplot @ 115200 baud
[env:teensy41_depo_door_test]
platform = teensy
board = teensy41
framework = arduino
build_src_filter = +<../test/test_depo_door/*> +<drivers/motor/depo_door_driver.cpp> +<drivers/sensors/current_sensors.cpp>

; Raw depo door bring-up — no driver, no dependencies. Just drives IN1/IN2/ENA directly.
; Build + upload:  pio run -e teensy41_depo_door_raw -t upload
; Monitor:         Serial Monitor @ 115200 baud
[env:teensy41_depo_door_raw]
platform = teensy
board = teensy41
framework = arduino
build_src_filter = +<../test/test_depo_door_raw/*>

; Single load-cell monitor based on RDT_2024_PF sensors.cpp HX711 setup.
; Pulls test/test_load_cell.cpp as the entry point only.
; Build + upload:  pio run -e teensy41_load_cell_test -t upload
; Monitor:         Serial Monitor / Teleplot @ 115200 baud
[env:teensy41_load_cell_test]
platform = teensy
board = teensy41
framework = arduino
build_src_filter = +<../test/test_load_cell.cpp>
lib_deps =
	bogde/HX711 @ ^0.7.5
