[env:teensy41]
platform = teensy
board = teensy41
framework = arduino
monitor_speed = 115200

lib_deps =
    https://github.com/tsandmann/freertos-teensy.git
    https://github.com/tonton81/FlexCAN_T4.git
    bogde/HX711

build_flags =
    -DTEENSY41
    -Wall
    -include "${PROJECT_DIR}/FreeRTOSConfig.h"

build_src_filter =
    +<**/*.cpp>
